<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1A1A1A"/>

  <!-- Top red rule -->
  <rect y="0" width="1200" height="6" fill="#CC0000"/>

  <!-- Left column accent -->
  <rect x="80" y="80" width="3" height="470" fill="#CC0000" opacity="0.4"/>

  <!-- Main wordmark -->
  <text x="120" y="300"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="900"
    font-size="110"
    fill="#F8F7F4"
    letter-spacing="-2">vibecoding</text>

  <!-- .work in red -->
  <text x="120" y="395"
    font-family="'Courier New', monospace"
    font-weight="500"
    font-size="76"
    fill="#CC0000"
    letter-spacing="0">.work</text>

  <!-- Tagline -->
  <text x="120" y="470"
    font-family="'Courier New', monospace"
    font-weight="400"
    font-size="22"
    fill="#555"
    letter-spacing="5">JOBS FOR AI-NATIVE BUILDERS</text>

  <!-- Divider line -->
  <rect x="120" y="490" width="960" height="1" fill="#333"/>

  <!-- Bottom caption -->
  <text x="120" y="520"
    font-family="'Courier New', monospace"
    font-weight="400"
    font-size="18"
    fill="#444"
    letter-spacing="2">Build fast. Ship faster. Let the AI do the heavy lifting.</text>

  <!-- Bottom red rule -->
  <rect y="624" width="1200" height="6" fill="#CC0000"/>
</svg>
